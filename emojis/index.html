<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="coi-serviceworker.js"></script>
    <meta name="color-scheme" content="light dark" />
    <title>emoji:s</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Theme tokens ─────────────────────────────────────────────── */
      :root {
        --bg:       #ffffff;
        --bg2:      #f9f9f9;
        --bg3:      #f0f0f0;
        --border:   #e0e0e0;
        --text:     #1a1a1a;
        --text2:    #666;
        --text3:    #999;
        --accent:   #5a7ff7;
        --kw-bg:    #eff4ff;
        --kw-text:  #3b5bdb;
        --kw-bdr:   #d0d7f0;
        --slack-bdr:#d4c5e8; --slack-text:#7c3aed; --slack-bg:#faf7ff;
        --gh-bdr:   #d4e8d4; --gh-text:#059669;   --gh-bg:#f7fff7;
        --ok:       #059669;
        --warn:     #d97706;
        --err:      #dc2626;
        --progress-bg: #e5e5e5;
        --popup-shadow: 0 8px 24px rgba(0,0,0,0.12);
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --bg:#0f0f10; --bg2:#1a1a1e; --bg3:#222226; --border:#2a2a2e;
          --text:#e8e8e8; --text2:#aaa; --text3:#666; --accent:#6b8bff;
          --kw-bg:#1e2540; --kw-text:#8ab4f8; --kw-bdr:#2a3558;
          --slack-bdr:#3a2e50; --slack-text:#c4a8f8; --slack-bg:transparent;
          --gh-bdr:#2a3a2a; --gh-text:#80c880; --gh-bg:transparent;
          --ok:#34d399; --warn:#fbbf24; --err:#f87171; --progress-bg:#2a2a2e;
          --popup-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
      }
      [data-theme="dark"] {
        --bg:#0f0f10; --bg2:#1a1a1e; --bg3:#222226; --border:#2a2a2e;
        --text:#e8e8e8; --text2:#aaa; --text3:#666; --accent:#6b8bff;
        --kw-bg:#1e2540; --kw-text:#8ab4f8; --kw-bdr:#2a3558;
        --slack-bdr:#3a2e50; --slack-text:#c4a8f8; --slack-bg:transparent;
        --gh-bdr:#2a3a2a; --gh-text:#80c880; --gh-bg:transparent;
        --ok:#34d399; --warn:#fbbf24; --err:#f87171; --progress-bg:#2a2a2e;
        --popup-shadow: 0 8px 24px rgba(0,0,0,0.5);
      }
      [data-theme="light"] {
        --bg:#ffffff; --bg2:#f9f9f9; --bg3:#f0f0f0; --border:#e0e0e0;
        --text:#1a1a1a; --text2:#666; --text3:#999; --accent:#5a7ff7;
        --kw-bg:#eff4ff; --kw-text:#3b5bdb; --kw-bdr:#d0d7f0;
        --slack-bdr:#d4c5e8; --slack-text:#7c3aed; --slack-bg:#faf7ff;
        --gh-bdr:#d4e8d4; --gh-text:#059669; --gh-bg:#f7fff7;
        --ok:#059669; --warn:#d97706; --err:#dc2626; --progress-bg:#e5e5e5;
        --popup-shadow: 0 8px 24px rgba(0,0,0,0.12);
      }

      /* ── Base ─────────────────────────────────────────────────────── */
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 1.25rem 1rem 4rem;
        transition: background 0.2s, color 0.2s;
      }

      /* ── Top bar ──────────────────────────────────────────────────── */
      .topbar {
        display: flex;
        justify-content: flex-end;
        max-width: 700px;
        margin: 0 auto 1.25rem;
        position: relative;
      }

      #settings-btn {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.35rem 0.65rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text2);
        font-size: 0.8rem;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      #settings-btn:hover { background: var(--bg2); color: var(--text); }
      #settings-btn svg { width: 14px; height: 14px; fill: currentColor; }

      /* ── Settings popup ───────────────────────────────────────────── */
      #settings-popup {
        display: none;
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        min-width: 220px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem;
        box-shadow: var(--popup-shadow);
        z-index: 100;
        flex-direction: column;
        gap: 1rem;
      }
      #settings-popup.open { display: flex; }

      .setting-row {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }
      .setting-row-label {
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .seg-group {
        display: flex;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }
      .seg-btn {
        flex: 1;
        padding: 0.3rem 0.5rem;
        border: none;
        border-right: 1px solid var(--border);
        background: transparent;
        color: var(--text2);
        font-size: 0.78rem;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        white-space: nowrap;
      }
      .seg-btn:last-child { border-right: none; }
      .seg-btn:hover { background: var(--bg2); color: var(--text); }
      .seg-btn.active { background: var(--accent); color: #fff; }

      /* ── Header ───────────────────────────────────────────────────── */
      h1 {
        text-align: center;
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 0.25rem;
        letter-spacing: -0.5px;
      }
      #tagline {
        text-align: center;
        color: var(--text2);
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
      }

      /* ── Search ───────────────────────────────────────────────────── */
      .search-box {
        max-width: 600px;
        margin: 0 auto 1.25rem;
      }
      #query-input {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--bg2);
        color: var(--text);
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s, background 0.2s;
      }
      #query-input:focus { border-color: var(--accent); }
      #query-input:disabled { opacity: 0.5; }

      /* ── Status ───────────────────────────────────────────────────── */
      .status {
        text-align: center;
        font-size: 0.85rem;
        margin-bottom: 1rem;
        min-height: 1.2em;
        color: var(--text3);
      }
      .status.loading { color: var(--warn); }
      .status.ready   { color: var(--ok); }
      .status.error   { color: var(--err); }

      /* ── Progress ─────────────────────────────────────────────────── */
      #progress-container {
        display: none;
        max-width: 500px;
        margin: 0 auto 1rem;
      }
      .progress-track {
        height: 5px;
        background: var(--progress-bg);
        border-radius: 3px;
        overflow: hidden;
      }
      #progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #a78bfa);
        width: 0%;
        transition: width 0.4s ease;
        border-radius: 3px;
      }

      /* ── Keywords ─────────────────────────────────────────────────── */
      .keywords {
        max-width: 700px;
        margin: 0 auto 1.25rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        align-items: center;
      }
      .kw-label { font-size: 0.78rem; color: var(--text3); }
      .kw {
        font-size: 0.78rem;
        background: var(--kw-bg);
        color: var(--kw-text);
        padding: 0.2rem 0.55rem;
        border-radius: 99px;
        border: 1px solid var(--kw-bdr);
      }

      /* ── Cards ────────────────────────────────────────────────────── */
      #results {
        max-width: 700px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .card {
        display: flex;
        align-items: center;
        gap: 1rem;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem 1.25rem;
        transition: border-color 0.2s, background 0.2s;
      }
      .card:hover { border-color: var(--accent); background: var(--bg3); }

      .emoji-big {
        width: 2.8rem;
        height: 2.8rem;
        font-size: 2rem;
        flex-shrink: 0;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: none;
        cursor: pointer;
        border-radius: 10px;
        transition: background 0.15s;
      }
      .emoji-big:hover { background: var(--border); }
      .emoji-big.copied {
        background: color-mix(in srgb, var(--ok) 20%, transparent);
        outline: 2px solid var(--ok);
        outline-offset: 1px;
      }

      .card-info { flex: 1; min-width: 0; }
      .description {
        font-size: 0.88rem;
        color: var(--text2);
        margin-bottom: 0.6rem;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.4rem;
      }
      .emoji-name-link {
        color: var(--text);
        text-decoration: none;
      }
      .emoji-name-link:hover strong {
        text-decoration: underline;
        color: var(--accent);
      }
      .shortcode-badge {
        font-size: 0.78rem;
        color: var(--text3);
      }

      .copy-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
      .copy-btn {
        padding: 0.35rem 0.7rem;
        border-radius: 7px;
        font-size: 0.78rem;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        white-space: nowrap;
        border: 1px solid var(--border);
        background: var(--bg3);
        color: var(--text2);
      }
      .copy-btn:hover { background: var(--border); color: var(--text); }
      .copy-btn.slack  { border-color:var(--slack-bdr); color:var(--slack-text); background:var(--slack-bg); }
      .copy-btn.github { border-color:var(--gh-bdr);    color:var(--gh-text);    background:var(--gh-bg); }
      .copy-btn.copied,
      .copy-btn.slack.copied,
      .copy-btn.github.copied { background:color-mix(in srgb,var(--ok) 15%,transparent); color:var(--ok); border-color:var(--ok); }

      /* Icon-only buttons — same size as .emoji-big */
      .copy-btn.icon-btn {
        width: 2.8rem;
        height: 2.8rem;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        border-radius: 10px;
        flex-shrink: 0;
      }
      .copy-btn.icon-btn svg { width: 20px; height: 20px; display: block; }
      .copy-btn.copied svg { opacity: 0.5; }

      code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.75em; }
      .no-results { text-align: center; color: var(--text3); padding: 2rem 0; }

      /* ── Match badges ─────────────────────────────────────────────── */
      .match-badge {
        font-size: 0.68rem;
        font-weight: 600;
        padding: 0.15rem 0.45rem;
        border-radius: 99px;
        border: 1px solid;
        white-space: nowrap;
        cursor: default;
        letter-spacing: 0.02em;
      }
      .match-cldr {
        background: color-mix(in srgb, var(--ok) 12%, transparent);
        color: var(--ok);
        border-color: color-mix(in srgb, var(--ok) 35%, transparent);
      }
      .match-dict, .match-llm {
        background: color-mix(in srgb, var(--accent) 10%, transparent);
        color: var(--accent);
        border-color: color-mix(in srgb, var(--accent) 30%, transparent);
      }
      .card-cldr { border-color: color-mix(in srgb, var(--ok) 40%, transparent); }
      .card-cldr:hover { border-color: var(--ok); }

      /* ── Show more ────────────────────────────────────────────────── */
      .show-more-btn {
        display: block;
        width: 100%;
        max-width: 700px;
        margin: 0.25rem auto 0;
        padding: 0.65rem 1rem;
        border-radius: 10px;
        border: 1px dashed var(--border);
        background: transparent;
        color: var(--text2);
        font-size: 0.85rem;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }
      .show-more-btn:hover {
        background: var(--bg2);
        color: var(--text);
        border-color: var(--accent);
      }

      /* ── Update banner ────────────────────────────────────────────── */
      #update-banner {
        position: fixed;
        bottom: 1.25rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.6rem 1rem;
        box-shadow: var(--popup-shadow);
        font-size: 0.85rem;
        color: var(--text);
        z-index: 200;
        white-space: nowrap;
      }
      #update-btn {
        padding: 0.3rem 0.75rem;
        border-radius: 7px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
      }
      #update-btn:hover { opacity: 0.85; }
    </style>
    <script type="module" crossorigin src="/emojis/assets/index-DhEeR_CQ.js"></script>
  </head>
  <body>

    <!-- Top bar -->
    <div class="topbar">
      <button id="settings-btn" aria-haspopup="true" aria-expanded="false">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm7.07-2.24a7.07 7.07 0 0 0 .06-.76 7.07 7.07 0 0 0-.06-.76l1.64-1.28a.4.4 0 0 0 .1-.5l-1.56-2.7a.4.4 0 0 0-.48-.17l-1.93.78a7.1 7.1 0 0 0-1.31-.76l-.29-2.05A.4.4 0 0 0 13 3h-3.12a.4.4 0 0 0-.39.34l-.3 2.05a7.1 7.1 0 0 0-1.3.76l-1.93-.78a.4.4 0 0 0-.48.17L4 8.24a.39.39 0 0 0 .1.5l1.64 1.28a7.2 7.2 0 0 0 0 1.52L4.1 12.82a.39.39 0 0 0-.1.5l1.56 2.7c.1.17.3.23.48.17l1.93-.78c.41.28.85.52 1.31.76l.29 2.05c.05.2.22.34.4.34H13a.4.4 0 0 0 .39-.34l.3-2.05a7.1 7.1 0 0 0 1.3-.76l1.93.78c.19.07.39 0 .48-.17l1.56-2.7a.39.39 0 0 0-.1-.5l-1.79-1.28z"/>
        </svg>
        Settings
      </button>

      <div id="settings-popup" role="dialog" aria-label="Settings">
        <div class="setting-row">
          <span class="setting-row-label" id="theme-label">Theme</span>
          <div class="seg-group">
            <button class="seg-btn theme-btn" data-theme="system">System</button>
            <button class="seg-btn theme-btn" data-theme="light">Light</button>
            <button class="seg-btn theme-btn" data-theme="dark">Dark</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-row-label" id="lang-label">Language</span>
          <div class="seg-group">
            <button class="seg-btn lang-btn" data-lang="ja">日本語</button>
            <button class="seg-btn lang-btn" data-lang="en">English</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-row-label" id="model-label">Model</span>
          <span id="model-name" style="font-size:0.78rem;color:var(--text2);word-break:break-all;"></span>
        </div>
      </div>
    </div>

    <h1>emoji:s 🔍</h1>
    <p id="tagline"></p>

    <div class="search-box">
      <input id="query-input" type="text" disabled />
    </div>

    <div id="progress-container">
      <div class="progress-track"><div id="progress-bar"></div></div>
    </div>

    <p id="status" class="status loading"></p>

    <div id="results"></div>

  </body>
</html>
