<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="coi-serviceworker.js"></script>
    <meta name="color-scheme" content="light dark" />
    <title>emoji:s</title>
    <script type="module" crossorigin src="/emojis/assets/index-DCbHpJJg.js"></script>
    <link rel="stylesheet" crossorigin href="/emojis/assets/index-DF_QhHGE.css">
  </head>
  <body>

    <!-- Top bar (buttons and popups are populated by main.js) -->
    <div class="topbar">
      <button id="help-btn" aria-label="Help" type="button" title="Help">?</button>
      <button id="settings-btn" aria-haspopup="true" aria-expanded="false"></button>

      <div id="settings-popup" role="dialog">
        <div class="setting-row">
          <span class="setting-row-label" id="theme-label"></span>
          <div class="seg-group">
            <button class="seg-btn theme-btn" data-theme="system"></button>
            <button class="seg-btn theme-btn" data-theme="light"></button>
            <button class="seg-btn theme-btn" data-theme="dark"></button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-row-label" id="lang-label"></span>
          <div class="seg-group">
            <button class="seg-btn lang-btn" data-lang="ja"></button>
            <button class="seg-btn lang-btn" data-lang="en"></button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-row-label" id="model-label"></span>
          <div id="model-names">
            <a id="model-name-llm" href="" target="_blank" rel="noopener noreferrer"></a>
            <a id="model-name-embed" href="" target="_blank" rel="noopener noreferrer"></a>
          </div>
        </div>
      </div>

      <div id="help-modal" role="dialog" aria-label="Help">
        <div class="help-modal-box">
          <button id="help-close" aria-label="Close help">✕</button>
          <div id="help-modal-content"></div>
        </div>
      </div>
    </div>

    <!-- Download warning modal -->
    <div id="download-modal" role="dialog" aria-modal="true" aria-labelledby="download-modal-title">
      <div id="download-modal-box">
        <h2 id="download-modal-title"><span>⚠️</span> <span id="dm-title"></span></h2>
        <p class="dm-body" id="dm-body"></p>
        <div class="dm-size"><span>📦</span> <span id="dm-size"></span></div>
        <div class="dm-actions">
          <button id="dm-help-btn"></button>
          <button id="download-ok-btn"></button>
        </div>
      </div>
    </div>

    <h1>emoji:s 🔍</h1>
    <p id="tagline"></p>

    <div class="search-box">
      <input id="query-input" type="text" disabled />
      <button id="clear-input" aria-label="Clear input" type="button">✕</button>
    </div>

    <div id="progress-container">
      <div class="progress-track"><div id="progress-bar"></div></div>
    </div>

    <p id="status" class="status loading"></p>

    <div id="results"></div>

  </body>
</html>
